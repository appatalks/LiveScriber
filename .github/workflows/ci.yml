name: CI

on:
  push:
    branches: [main, windows]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq portaudio19-dev libsndfile1

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Syntax check (all modules)
        run: |
          python -m py_compile livescribe/__init__.py
          python -m py_compile livescribe/config.py
          python -m py_compile livescribe/recorder.py
          python -m py_compile livescribe/transcriber.py
          python -m py_compile livescribe/summarizer.py
          python -m py_compile livescribe/styles.py
          python -m py_compile livescribe/main.py
          python -m py_compile livescribe/app.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
